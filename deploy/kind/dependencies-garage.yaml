apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  labels:
    app.kubernetes.io/name: garage
data:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "sqlite"
    replication_factor = 1
    consistency_mode = "consistent"
    rpc_bind_addr = "[::]:3901"
    rpc_public_addr = "garage:3901"
    rpc_secret = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

    [s3_api]
    s3_region = "us-east-1"
    api_bind_addr = "[::]:3900"
    root_domain = ".s3.garage.local"

    [s3_web]
    bind_addr = "[::]:3902"
    root_domain = ".web.garage.local"
    index = "index.html"

    [admin]
    api_bind_addr = "[::]:3903"
    admin_token = "kind-garage-admin-token"
    metrics_token = "kind-garage-metrics-token"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage
  labels:
    app.kubernetes.io/name: garage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: garage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
    spec:
      containers:
        - name: garage
          image: dxflrs/garage:v2.3.0
          command:
            - /garage
            - server
          ports:
            - containerPort: 3900
              name: s3
            - containerPort: 3901
              name: rpc
            - containerPort: 3902
              name: web
            - containerPort: 3903
              name: admin
          volumeMounts:
            - name: config
              mountPath: /etc/garage.toml
              subPath: garage.toml
            - name: meta
              mountPath: /var/lib/garage/meta
            - name: data
              mountPath: /var/lib/garage/data
      volumes:
        - name: config
          configMap:
            name: garage-config
        - name: meta
          emptyDir: {}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: garage
spec:
  selector:
    app.kubernetes.io/name: garage
  ports:
    - name: s3
      port: 3900
      targetPort: s3
    - name: rpc
      port: 3901
      targetPort: rpc
    - name: web
      port: 3902
      targetPort: web
    - name: admin
      port: 3903
      targetPort: admin
