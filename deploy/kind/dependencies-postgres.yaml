apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: kublai
            - name: POSTGRES_USER
              value: kublai
            - name: POSTGRES_PASSWORD
              value: kublai
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - kublai
                - -d
                - kublai
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
